:root {
  --green: #00C853;
  --dark: #111;
  --bg: #f8f8f8;

* { margin:0; padding:0; box-sizing:border-box; }
body {

  background: var(--bg);
  color: var(--dark);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.header {
  background: var(--dark);
  padding: 20px 16px;
  text-align: center;
}
.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 4px;
  color: #fff;
}
.header h1 span { color: var(--green); }
.header p {
  font-size: 12px;
  color: #888;
  margin-top: 4px;
}

.controls {
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 24px;
  border: none;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  min-height: 52px;
}
.btn:active { transform: scale(0.97); }
.btn-primary {
  background: var(--green);
  color: #fff;
}
.btn-secondary {
  background: var(--dark);
  color: #fff;
}
.btn-outline {
  background: #fff;
  color: var(--dark);
  border: 2px solid #eee;
}
.btn:disabled {
  opacity: 0.5;
  pointer-events: none;
}

.status {
  text-align: center;
  padding: 12px;
  font-size: 13px;
  color: #888;
  min-height: 40px;
}
.status.error { color: #e53935; }
.status.success { color: var(--green); }

.progress-bar {
  height: 4px;
  background: #eee;
  border-radius: 2px;
  margin: 0 16px;
  overflow: hidden;
  display: none;
}
.progress-bar .fill {
  height: 100%;
  background: var(--green);
  border-radius: 2px;
  transition: width .3s;
  width: 0%;
}

/* Stock summary */
.stock-summary {
  padding: 0 16px 16px;
  display: none;
}
.stock-card {
  background: #fff;
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  box-shadow: 0 2px 12px rgba(0,0,0,.04);
}
.stock-card h3 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  margin-bottom: 8px;
}
.stock-card .variant {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 13px;
  border-bottom: 1px solid #f5f5f5;
}
.stock-card .variant:last-child { border: none; }
.stock-card .qty {
  color: var(--green);
  font-weight: 700;
}

/* Story previews */
.stories-grid {
  padding: 0 16px 100px;
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
@media(min-width:600px){
  .stories-grid { grid-template-columns: repeat(3, 1fr); }
}
@media(min-width:900px){
  .stories-grid { grid-template-columns: repeat(4, 1fr); max-width: 960px; margin: 0 auto; }
}
.story-preview {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 9/16;
  background: #222;
  cursor: pointer;
}
.story-preview img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.story-preview .dl-badge {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: var(--green);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 4px 8px;
  border-radius: 6px;
}
.story-preview .label {
  position: absolute;
  bottom: 8px;
  left: 8px;
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  text-shadow: 0 1px 4px rgba(0,0,0,.8);
  max-width: 70%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.story-preview-wrap {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.link-row {
  display: flex;
  gap: 4px;
}
.link-input {
  flex: 1;
  font-size: 10px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 8px;
  border: 2px solid #eee;
  border-radius: 8px;
  background: #fff;
  color: #555;
  min-width: 0;
  outline: none;
}
.link-input:focus { border-color: var(--green); }
.copy-btn {
  padding: 6px 10px;
  border: 2px solid #eee;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  font-size: 14px;
  transition: all .2s;
  flex-shrink: 0;
}
.copy-btn.copied {
  background: var(--green);
  border-color: var(--green);
}

/* Hidden canvases */
.hidden { display: none; }

/* Download all bar */
.download-all-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px;
  background: rgba(255,255,255,.95);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-top: 1px solid #eee;
  display: none;
  z-index: 100;
}
.download-all-bar > div {
  max-width: 500px;
  margin: 0 auto;
}

// ═══ FETCH STOCK FROM WIX ═══
async function fetchStock() {
  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Pulling stock...';
  setStatus('Connecting to Wix...');
  setProgress(10);

  try {
    // We can't call Wix API directly from browser (CORS), so we use the Supabase approach
    // Actually let's try the inventory query via a proxy approach
    // Since Wix MCP isn't available in browser, we'll query products from the CSV data embedded
    // OR we use the approach of fetching from the site itself
    
    // Best approach: fetch the inventory from Wix REST API

    // Since we can't use MCP from browser, let's embed the stock check logic
    // We'll use the Supabase edge function approach or direct API
    
    // For now, let's do a direct fetch to Wix API (may need CORS proxy)
    const resp = await fetch('https://www.wixapis.com/stores/v3/inventory-items/query', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': WIX_SITE_ID
      },
      body: JSON.stringify({
        query: { filter: { quantity: { "$gt": 0 } }, paging: { limit: 100 } }
      })
    });
    
    if (!resp.ok) throw new Error('Wix API needs auth - using manual mode');
    const data = await resp.json();
    processWixData(data.inventoryItems);
  } catch(e) {
    // Wix API won't work from browser without OAuth
    // Fall back to manual stock entry or use cached data
    setStatus('Wix API requires server auth. Using manual stock input...', '');
    setProgress(50);
    showManualMode();
    btn.disabled = false;
    btn.textContent = '📦 Pull Live Stock from Wix';
    return;
  }
}

      stockData = data;
    } else if (data.inventoryItems) {
      processWixData(data.inventoryItems);
      return;
    }
    renderStockSummary();
    document.getElementById('generateControls').style.display = 'block';
    setStatus(`Parsed ${stockData.length} variants`, 'success');
  } catch(e) {
    setStatus('Invalid JSON — check the data format', 'error');
  }
}

function processWixData(items) {
  stockData = items
    .filter(i => i.availabilityStatus === 'IN_STOCK' && i.quantity > 0 && i.product?.variantVisible)
    .map(i => {
      const parts = (i.product?.variantName || '').split(' | ');
      return {
        product: (i.product?.name || '').trim(),
        variant: i.product?.variantName || '',
        color: parts[1] || '',
        size: parts[0] || '',
        qty: i.quantity,
        delivery: parts[2] || 'next day'
      };
    });
  renderStockSummary();
  document.getElementById('generateControls').style.display = 'block';
  setStatus(`Found ${stockData.length} in-stock variants`, 'success');
}

// ═══ RENDER STOCK SUMMARY ═══
function renderStockSummary() {
  const grouped = {};
  stockData.forEach(s => {
    if (!grouped[s.product]) grouped[s.product] = [];
    grouped[s.product].push(s);
  });

  const el = document.getElementById('stockSummary');
  el.style.display = 'block';
  el.innerHTML = Object.entries(grouped).map(([name, items]) => {
    const total = items.reduce((a,b) => a + b.qty, 0);
    return `<div class="stock-card">
      <h3>${name} <span style="font-size:14px;color:var(--green)">(${total})</span></h3>
      ${items.map(i => `
        <div class="variant">
          <span>${COLOR_EMOJIS[i.color]||'▪️'} ${i.color} ${i.size}</span>
          <span class="qty">${i.qty} in stock</span>
        </div>
      `).join('')}
    </div>`;
  }).join('');
}

// ═══ GENERATE STORY IMAGES ═══
async function generateAllStories() {
  const grid = document.getElementById('storiesGrid');
  grid.innerHTML = '';
  storyCanvases = [];
  setStatus('Loading fonts...');
  setProgress(5);

  // Wait for fonts to load (critical for canvas text)
  try {
    await document.fonts.ready;
    // Also explicitly wait for our fonts
    await Promise.race([
      Promise.all([
        document.fonts.load('700 32px "Bebas Neue"'),
        document.fonts.load('700 30px "DM Sans"')
      ]),
      new Promise(r => setTimeout(r, 3000)) // 3s timeout
    ]);
  } catch(e) { /* continue anyway */ }

  setStatus('Generating story images...');
  setProgress(10);

  // Group by product + color for sneakers, or just product for others
  const groups = {};
  stockData.forEach(s => {
    let key = s.product;
    if (s.product.includes('Sneakers')) key = s.product + ' - ' + s.color;
    if (!groups[key]) groups[key] = { product: s.product, color: s.color, items: [] };
    groups[key].items.push(s);
  });

  const entries = Object.entries(groups);
  let done = 0;
  let errors = 0;

  for (const [key, group] of entries) {
    try {
      setStatus(`Generating ${done+1}/${entries.length}: ${key}...`);
      await generateStory(group, grid);
    } catch(e) {
      errors++;
      console.error('Error generating story for', key, e);
      setStatus(`Error on ${key}: ${e.message}`, 'error');
    }
    done++;
    setProgress(Math.round(done / entries.length * 100));
  }

  if (storyCanvases.length > 0) {
    document.getElementById('downloadBar').style.display = 'block';
  }
  setStatus(`Generated ${storyCanvases.length} story images${errors?' ('+errors+' failed)':''} — tap to download`, storyCanvases.length?'success':'error');
}

async function generateStory(group, grid) {
  const canvas = document.createElement('canvas');
  canvas.width = 1080;
  canvas.height = 1920;
  const ctx = canvas.getContext('2d');

  // Get product image URL
  const imgMap = PRODUCT_IMAGES[group.product] || {};
  const imgUrl = imgMap[group.color] || imgMap._default || '';

  // Draw background - use styled gradient since product images can't load from local files
  const gradients = {
    'Light Blue': ['#0ea5e9','#0284c7'],
    'Black': ['#1a1a2e','#16213e'],
    'Dark blue': ['#1e3a5f','#0d2137'],
    'Dark Blue': ['#1e3a5f','#0d2137'],
    'white/black': ['#374151','#1f2937'],
    'White/Black': ['#374151','#1f2937'],
    'White': ['#e5e7eb','#d1d5db'],
    'Grey': ['#4b5563','#374151'],
    'grey': ['#4b5563','#374151'],
    'black': ['#1a1a2e','#16213e'],
    'Black/White': ['#1f2937','#111827'],
    'Blue/Black': ['#1e3a5f','#111827'],
    'lime soles': ['#15803d','#166534'],
    'Lime Soles': ['#15803d','#166534'],
    'Brown': ['#78350f','#451a03'],
    '': ['#111827','#0f172a'],
    '_default': ['#111827','#0f172a']
  };
  const colors = gradients[group.color] || gradients['_default'];
  const grd = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grd.addColorStop(0, colors[0]);
  grd.addColorStop(1, colors[1]);
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  // Add subtle pattern overlay
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for(let i = 0; i < 20; i++){
    const x = Math.random() * canvas.width;
    const y = Math.random() * canvas.height;
    const r = Math.random() * 200 + 50;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Try loading product image on top (works when hosted, gracefully skips when local)
  if (imgUrl) {
    try {
      const img = await loadImage(imgUrl);
      const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
      const w = img.width * scale;
      const h = img.height * scale;
      ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
      ctx.fillStyle = 'rgba(0,0,0,0.45)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    } catch(e) {
      // Gradient background already drawn — continue
    }
  }

  // Top bar with brand
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(ctx, 40, 80, 300, 60, 16);
  ctx.fill();
  ctx.font = '700 32px "Bebas Neue", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText('ESNTLS', 60, 120);
  ctx.fillStyle = '#00C853';
  ctx.fillText('CLUB', 60 + ctx.measureText('ESNTLS').width + 8, 120);

  // Product name badge
  const displayName = group.product.replace('Technical Sneakers', 'B22').replace('Daily Sneakers', 'B30');
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  const nameWidth = measureText(ctx, displayName, '700 44px "Bebas Neue", sans-serif') + 48;
  roundRect(ctx, 540 - nameWidth/2, 240, nameWidth, 64, 16);
  ctx.fill();
  ctx.font = '700 44px "Bebas Neue", sans-serif';
  ctx.fillStyle = '#111';
  ctx.textAlign = 'center';
  ctx.fillText(displayName, 540, 282);

  // Color badge (for sneakers)
  let y = 340;
  if (group.color && group.product.includes('Sneakers')) {
    const emoji = COLOR_EMOJIS[group.color] || '▪️';
    const colorText = `${emoji} ${group.color.toUpperCase()}`;
    ctx.fillStyle = 'rgba(255,255,255,0.95)';
    const cw = measureText(ctx, colorText, '700 36px "DM Sans", sans-serif') + 48;
    roundRect(ctx, 540 - cw/2, y, cw, 56, 14);
    ctx.fill();
    ctx.font = '700 36px "DM Sans", sans-serif';
    ctx.fillStyle = '#111';
    ctx.textAlign = 'center';
    ctx.fillText(colorText, 540, y + 40);
    y += 80;
  }

  // Size + quantity lines
  for (const item of group.items) {
    const sizeText = `${item.size} — ${item.qty} ${item.qty === 1 ? 'pair' : 'pairs'} left`;
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    const sw = measureText(ctx, sizeText, '600 30px "DM Sans", sans-serif') + 40;
    roundRect(ctx, 540 - sw/2, y, sw, 48, 12);
    ctx.fill();
    ctx.font = '600 30px "DM Sans", sans-serif';
    ctx.fillStyle = '#111';
    ctx.textAlign = 'center';
    ctx.fillText(sizeText, 540, y + 34);
    y += 62;
  }

  // Total remaining
  const total = group.items.reduce((a,b) => a + b.qty, 0);
  y += 20;
  ctx.fillStyle = 'rgba(0,200,83,0.95)';
  const totalText = `${total} ${total === 1 ? 'pair' : 'pairs'} remaining ⚡`;
  const tw = measureText(ctx, totalText, '700 32px "DM Sans", sans-serif') + 40;
  roundRect(ctx, 540 - tw/2, y, tw, 52, 14);
  ctx.fill();
  ctx.font = '700 32px "DM Sans", sans-serif';
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.fillText(totalText, 540, y + 37);

  // Buy now button
  y += 80;
  ctx.fillStyle = 'rgba(255,255,255,0.95)';
  roundRect(ctx, 540 - 120, y, 240, 52, 26);
  ctx.fill();
  ctx.font = '700 26px "DM Sans", sans-serif';
  ctx.fillStyle = '#111';
  ctx.fillText('🔗 BUY NOW', 540, y + 36);

  // Bottom - website
  ctx.font = '600 24px "DM Sans", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText('esntlsclub.com', 540, 1860);

  // Add to grid
  const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
  const slug = (group.product + '-' + (group.color || '')).replace(/[^a-z0-9]+/gi, '-').toLowerCase();
  const productLink = getProductLink(group.product, group.color);
  storyCanvases.push({ dataUrl, name: `esntls-stock-${slug}.jpg`, link: productLink });

  const preview = document.createElement('div');
  preview.className = 'story-preview-wrap';
  preview.innerHTML = `
    <div class="story-preview" onclick="downloadSingle('${dataUrl.replace(/'/g,"\\'")}', 'esntls-stock-${slug}.jpg')">
      <img src="${dataUrl}">
      <span class="label">${displayName} ${group.color || ''}</span>
      <span class="dl-badge">⬇️</span>
    </div>
    <div class="link-row">
      <input type="text" value="${productLink}" readonly class="link-input" id="link-${slug}">
      <button class="copy-btn" onclick="copyLink('link-${slug}', this)">📋</button>
      <button class="copy-btn" onclick="shareStory(${storyCanvases.length - 1}, this)" title="${navigator.share ? 'Share' : 'Download + Copy Link'}">📤</button>
    </div>
  `;
  grid.appendChild(preview);
}

// ═══ HELPERS ═══
function loadImage(url) {
  return new Promise((resolve, reject) => {
    // Set a 10 second timeout
    const timeout = setTimeout(() => reject(new Error('Image load timeout')), 10000);
    
    // Try fetch blob first (best for CORS)
    fetch(url)
      .then(res => {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.blob();
      })
      .then(blob => {
        const objUrl = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => { clearTimeout(timeout); resolve(img); };
        img.onerror = () => { 
          URL.revokeObjectURL(objUrl);
          clearTimeout(timeout);
          reject(new Error('Blob image failed'));
        };
        img.src = objUrl;
      })
      .catch(fetchErr => {
        // Fallback: direct image load
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => { clearTimeout(timeout); resolve(img); };
        img.onerror = () => {
          // Last try without crossOrigin
          const img2 = new Image();
          img2.onload = () => { clearTimeout(timeout); resolve(img2); };
          img2.onerror = () => { clearTimeout(timeout); reject(new Error('All methods failed')); };
          img2.src = url;
        };
        img.src = url;
      });
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function measureText(ctx, text, font) {
  ctx.save();
  ctx.font = font;
  const w = ctx.measureText(text).width;
  ctx.restore();
  return w;
}

function downloadSingle(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// Cross-platform clipboard copy
function copyLink(inputId, btn) {
  const input = document.getElementById(inputId);
  const text = input.value;
  const done = () => {
    btn.textContent = '✅';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '📋'; btn.classList.remove('copied'); }, 2000);
  };
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(text).then(done).catch(()=>{fallbackCopy(text);done()});
  } else {
    fallbackCopy(text);
    done();
  }
}

function fallbackCopy(text){
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.cssText = 'position:fixed;left:-9999px;top:0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  ta.setSelectionRange(0, 99999);
  document.execCommand('copy');
  document.body.removeChild(ta);
}

// Share story — native share on mobile, download + copy link on desktop
async function shareStory(index, btn) {
  const story = storyCanvases[index];
  if (!story) return;
  
  try {
    if (navigator.share) {
      // Try sharing with file (mobile)
      const res = await fetch(story.dataUrl);
      const blob = await res.blob();
      const file = new File([blob], story.name, { type: 'image/jpeg' });
      
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          title: 'ESNTLS CLUB Stock Update',
          text: 'Check out what\'s in stock! ' + story.link,
          files: [file]
        });
        btn.textContent = '✅';
        setTimeout(() => { btn.textContent = '📤'; }, 2000);
        return;
      }
      
      // Share link only (some mobile browsers)
      await navigator.share({
        title: 'ESNTLS CLUB Stock Update',
        text: 'Check out what\'s in stock!',
        url: story.link
      });
      btn.textContent = '✅';
      setTimeout(() => { btn.textContent = '📤'; }, 2000);
    } else {
      // Desktop fallback — download image + copy link
      downloadSingle(story.dataUrl, story.name);
      fallbackCopy(story.link);
      btn.textContent = '✅ Saved + Link Copied';
      btn.style.fontSize = '10px';
      setTimeout(() => { btn.textContent = '📤'; btn.style.fontSize = ''; }, 2500);
    }
  } catch(e) {
    if (e.name !== 'AbortError') {
      // Fallback on any error
      downloadSingle(story.dataUrl, story.name);
      btn.textContent = '⬇️';
      setTimeout(() => { btn.textContent = '📤'; }, 2000);
    }
  }
}

async function shareAll() {
  try {
    if (navigator.share) {
      const files = [];
      for (const story of storyCanvases) {
        const res = await fetch(story.dataUrl);
        const blob = await res.blob();
        files.push(new File([blob], story.name, { type: 'image/jpeg' }));
      }
      if (navigator.canShare && navigator.canShare({ files })) {
        await navigator.share({
          title: 'ESNTLS CLUB Stock Update',
          text: 'Full stock update! esntlsclub.com/#stock',
          files
        });
        return;
      }
    }
    // Desktop or no file share support — download all
    downloadAll();
  } catch(e) {
    if (e.name !== 'AbortError') downloadAll();
  }
}

function downloadAll() {
  storyCanvases.forEach((s, i) => {
    setTimeout(() => downloadSingle(s.dataUrl, s.name), i * 500);
  });
}
